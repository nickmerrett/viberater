apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: viberater-build-test-deploy
  namespace: build
  labels:
    app: viberater-pipeline
    managed-by: kustomize
spec:
  description: |
    CI/CD pipeline for Viberater platform.
    Flow: clone → unit tests (parallel, fail-fast) → builds (parallel) → smoke → deploy.
    Images are tagged with the git commit SHA for traceability and to guarantee
    Kubernetes detects the new image on every deploy.
  params:
    - name: repo-url
      description: The git repository URL to clone from.
      type: string
    - name: tag-name
      description: The git tag or branch to clone.
      type: string
    - name: backend-image
      description: 'Base image path for backend WITHOUT tag (e.g. registry/viberater-backend)'
      type: string
    - name: frontend-image
      description: 'Base image path for frontend WITHOUT tag (e.g. registry/viberater-frontend)'
      type: string
    - name: deployment-manifest
      description: Path to the deployment manifests directory.
      type: string
  workspaces:
    - name: workspace
    - name: basic-auth
    - name: empty-dir

  tasks:
    # ── 1. Clone ──────────────────────────────────────────────────────────────
    - name: fetch-repository
      taskRef:
        kind: Task
        name: git-clone
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.tag-name)
        - name: deleteExisting
          value: 'true'
        - name: subdirectory
          value: viberater
      workspaces:
        - name: output
          workspace: workspace
        - name: basic-auth
          workspace: basic-auth

    # ── 2a. Backend unit tests (source, fail-fast before build) ───────────────
    - name: test-backend
      runAfter:
        - fetch-repository
      workspaces:
        - name: source
          workspace: workspace
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: install-and-test
            image: node:20-alpine
            securityContext:
              runAsUser: 0
            workingDir: $(workspaces.source.path)/viberater/backend
            env:
              - name: NODE_ENV
                value: test
              - name: JWT_SECRET
                value: test-secret-key-for-ci-min-32-chars!!
              - name: DB_TYPE
                value: sqlite
              - name: SQLITE_DIR
                value: /tmp
            script: |
              #!/bin/sh
              set -e
              echo "=== Installing build tools for native modules ==="
              apk add --no-cache --quiet python3 make g++
              echo "=== Installing dependencies ==="
              npm install
              echo "=== Running backend tests ==="
              npm test
              echo "=== Backend tests passed ==="

    # ── 2b. Frontend unit tests (source, fail-fast before build) ─────────────
    - name: test-frontend
      runAfter:
        - fetch-repository
      workspaces:
        - name: source
          workspace: workspace
      taskSpec:
        workspaces:
          - name: source
        steps:
          - name: install-and-test
            image: node:20-alpine
            securityContext:
              runAsUser: 0
            workingDir: $(workspaces.source.path)/viberater/frontend
            script: |
              #!/bin/sh
              set -e
              echo "=== Installing dependencies ==="
              npm install
              echo "=== Running frontend tests ==="
              npm test -- --run
              echo "=== Frontend tests passed ==="

    # ── 3a. Build backend image — tagged with git commit SHA ──────────────────
    - name: build-backend
      runAfter:
        - test-backend
        - test-frontend
      taskRef:
        kind: Task
        name: buildah
      params:
        - name: IMAGE
          value: $(params.backend-image):$(tasks.fetch-repository.results.commit)
        - name: DOCKERFILE
          value: viberater/backend/Dockerfile
        - name: CONTEXT
          value: viberater/backend
        - name: TLSVERIFY
          value: 'false'
        - name: STORAGE_DRIVER
          value: vfs
      workspaces:
        - name: source
          workspace: workspace

    # ── 3b. Build frontend image — tagged with git commit SHA ─────────────────
    - name: build-frontend
      runAfter:
        - test-backend
        - test-frontend
      taskRef:
        kind: Task
        name: buildah
      params:
        - name: IMAGE
          value: $(params.frontend-image):$(tasks.fetch-repository.results.commit)
        - name: DOCKERFILE
          value: viberater/frontend/Dockerfile
        - name: CONTEXT
          value: viberater/frontend
        - name: TLSVERIFY
          value: 'false'
        - name: STORAGE_DRIVER
          value: vfs
        - name: BUILD_EXTRA_ARGS
          value: --build-arg BUILD_ID=$(tasks.fetch-repository.results.commit)
      workspaces:
        - name: source
          workspace: workspace

    # ── 4. Smoke tests — run against the SHA-tagged image ────────────────────
    - name: smoke-tests
      runAfter:
        - build-backend
        - build-frontend
      params:
        - name: backend-image
          value: $(params.backend-image):$(tasks.fetch-repository.results.commit)
        - name: frontend-image
          value: $(params.frontend-image):$(tasks.fetch-repository.results.commit)
      workspaces:
        - name: source
          workspace: workspace
      taskSpec:
        metadata: {}
        params:
          - name: backend-image
            type: string
          - name: frontend-image
            type: string
        workspaces:
          - name: source
        sidecars:
          - name: backend
            image: $(params.backend-image)
            env:
              - name: NODE_ENV
                value: test
              - name: JWT_SECRET
                value: smoke-test-secret
              - name: DB_TYPE
                value: sqlite
              - name: SQLITE_DIR
                value: /tmp
              - name: PORT
                value: '3000'
            readinessProbe:
              httpGet:
                path: /health
                port: 3000
              initialDelaySeconds: 10
              periodSeconds: 5
        steps:
          - name: wait-for-backend
            image: 'curlimages/curl:latest'
            script: |
              #!/bin/sh
              set -e
              echo "=== Waiting for backend to be ready ==="
              for i in $(seq 1 30); do
                if curl -s http://localhost:3000/health > /dev/null 2>&1; then
                  echo "Backend is healthy!"
                  break
                fi
                echo "Waiting... ($i/30)"
                sleep 2
              done
              curl -f http://localhost:3000/health || exit 1
              echo "=== Backend health check passed ==="

          - name: api-smoke-tests
            image: 'curlimages/curl:latest'
            script: |
              #!/bin/sh
              set -e
              echo "=== Running API smoke tests ==="

              echo "Testing /health..."
              curl -f http://localhost:3000/health

              echo "Testing /api/auth/login (expect 400 without body)..."
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3000/api/auth/login)
              if [ "$STATUS" = "400" ]; then
                echo "Auth endpoint responding correctly"
              else
                echo "Unexpected status: $STATUS"
                exit 1
              fi

              echo "=== Smoke tests passed ==="

    # ── 5. Deploy — apply manifests then pin deployments to the built SHA ─────
    - name: deploy
      runAfter:
        - smoke-tests
      taskRef:
        kind: Task
        name: kubernetes-actions
      params:
        - name: script
          value: |
            COMMIT="$(tasks.fetch-repository.results.commit)"
            echo "=== Deploying Viberater (commit: $COMMIT) ==="

            kubectl apply -k viberater/k8s/

            echo "--- Updating images to commit $COMMIT ---"
            kubectl set image deployment/viberater-backend \
              backend=$(params.backend-image):$COMMIT \
              -n viberater
            kubectl set image deployment/viberater-frontend \
              frontend=$(params.frontend-image):$COMMIT \
              -n viberater

            echo "--- Waiting for rollout ---"
            kubectl rollout status deployment/viberater-backend -n viberater --timeout=120s
            kubectl rollout status deployment/viberater-frontend -n viberater --timeout=120s
            echo "----------"
            kubectl get all -n viberater
            echo "=== Deployment complete ==="
      workspaces:
        - name: kubeconfig-dir
          workspace: empty-dir
        - name: manifest-dir
          workspace: workspace
