apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: viberater-build-test-deploy
  namespace: build
  labels:
    app: viberater-pipeline
    managed-by: kustomize
spec:
  description: |
    CI/CD pipeline for Viberater platform:
    - Fetches git repository into viberater/ subdirectory (isolated from other pipelines on shared PVC)
    - Builds backend and frontend Docker images
    - Runs integration tests against built images
    - Deploys to Kubernetes cluster
  params:
    - name: repo-url
      description: The git repository URL to clone from.
      type: string
    - name: tag-name
      description: The git tag to clone.
      type: string
    - name: backend-image
      description: 'Full image path for backend (e.g. registry/viberater-backend:latest)'
      type: string
    - name: frontend-image
      description: 'Full image path for frontend (e.g. registry/viberater-frontend:latest)'
      type: string
    - name: deployment-manifest
      description: Path to the deployment manifests directory.
      type: string
  workspaces:
    - name: workspace
    - name: basic-auth
    - name: empty-dir
  tasks:
    - name: fetch-repository
      taskRef:
        kind: Task
        name: git-clone
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.tag-name)
        - name: deleteExisting
          value: 'true'
        - name: subdirectory
          value: viberater
      workspaces:
        - name: output
          workspace: workspace
        - name: basic-auth
          workspace: basic-auth

    - name: build-backend
      runAfter:
        - fetch-repository
      taskRef:
        kind: Task
        name: buildah
      params:
        - name: IMAGE
          value: $(params.backend-image)
        - name: DOCKERFILE
          value: backend/Dockerfile
        - name: CONTEXT
          value: backend
        - name: TLSVERIFY
          value: 'false'
        - name: STORAGE_DRIVER
          value: vfs
      workspaces:
        - name: source
          workspace: workspace
          subPath: viberater

    - name: build-frontend
      runAfter:
        - fetch-repository
      taskRef:
        kind: Task
        name: buildah
      params:
        - name: IMAGE
          value: $(params.frontend-image)
        - name: DOCKERFILE
          value: frontend/Dockerfile
        - name: CONTEXT
          value: frontend
        - name: TLSVERIFY
          value: 'false'
        - name: STORAGE_DRIVER
          value: vfs
      workspaces:
        - name: source
          workspace: workspace
          subPath: viberater

    - name: backend-integration-tests
      runAfter:
        - build-backend
      params:
        - name: backend-image
          value: $(params.backend-image)
      workspaces:
        - name: source
          workspace: workspace
      taskSpec:
        params:
          - name: backend-image
            type: string
        workspaces:
          - name: source
        steps:
          - name: run-integration-tests
            image: $(params.backend-image)
            env:
              - name: NODE_ENV
                value: test
              - name: JWT_SECRET
                value: test-secret-key-for-ci
              - name: DB_TYPE
                value: sqlite
              - name: SQLITE_DIR
                value: /tmp
            workingDir: /app
            script: |
              #!/bin/sh
              set -e
              echo "=== Running backend integration tests ==="
              npm test -- --passWithNoTests
              echo "=== Backend integration tests passed ==="

    - name: smoke-tests
      runAfter:
        - backend-integration-tests
        - build-frontend
      params:
        - name: backend-image
          value: $(params.backend-image)
        - name: frontend-image
          value: $(params.frontend-image)
      workspaces:
        - name: source
          workspace: workspace
      taskSpec:
        params:
          - name: backend-image
            type: string
          - name: frontend-image
            type: string
        workspaces:
          - name: source
        sidecars:
          - name: backend
            image: $(params.backend-image)
            env:
              - name: NODE_ENV
                value: test
              - name: JWT_SECRET
                value: smoke-test-secret
              - name: DB_TYPE
                value: sqlite
              - name: SQLITE_DIR
                value: /tmp
              - name: PORT
                value: '3000'
            readinessProbe:
              httpGet:
                path: /health
                port: 3000
              initialDelaySeconds: 10
              periodSeconds: 5
        steps:
          - name: wait-for-backend
            image: 'curlimages/curl:latest'
            script: |
              #!/bin/sh
              set -e
              echo "=== Waiting for backend to be ready ==="

              for i in $(seq 1 30); do
                if curl -s http://localhost:3000/health > /dev/null 2>&1; then
                  echo "Backend is healthy!"
                  break
                fi
                echo "Waiting for backend... ($i/30)"
                sleep 2
              done

              curl -f http://localhost:3000/health || exit 1
              echo "=== Backend health check passed ==="

          - name: api-smoke-tests
            image: 'curlimages/curl:latest'
            script: |
              #!/bin/sh
              set -e
              echo "=== Running API smoke tests ==="

              echo "Testing /health..."
              curl -f http://localhost:3000/health

              echo "Testing /api/auth/login (expect 400 without body)..."
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST http://localhost:3000/api/auth/login)
              if [ "$STATUS" = "400" ]; then
                echo "Auth endpoint responding correctly"
              else
                echo "Unexpected status: $STATUS"
                exit 1
              fi

              echo "=== Smoke tests passed ==="

    - name: deploy
      runAfter:
        - smoke-tests
      taskRef:
        kind: Task
        name: kubernetes-actions
      params:
        - name: script
          value: |
            echo "=== Deploying Viberater ==="
            kubectl apply -k k8s/
            echo "----------"
            kubectl rollout status deployment/viberater-backend -n viberater --timeout=120s
            kubectl rollout status deployment/viberater-frontend -n viberater --timeout=120s
            echo "----------"
            kubectl get all -n viberater
            echo "=== Deployment complete ==="
      workspaces:
        - name: kubeconfig-dir
          workspace: empty-dir
        - name: manifest-dir
          workspace: workspace
          subPath: viberater
