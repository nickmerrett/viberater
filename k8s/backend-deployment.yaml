apiVersion: apps/v1
kind: Deployment
metadata:
  name: viberater-backend
  namespace: viberater
  labels:
    app: viberater-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: viberater-backend
      app.kubernetes.io/name: viberater
      app.kubernetes.io/version: '2.0'
  template:
    metadata:
      creationTimestamp: null
      labels:
        app: viberater-backend
        app.kubernetes.io/name: viberater
        app.kubernetes.io/version: '2.0'
    spec:
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: backend-storage-pvc
        - name: logs
          emptyDir: {}
      initContainers:
        - resources: {}
          terminationMessagePath: /dev/termination-log
          name: run-migrations
          command:
            - npm
            - run
            - migrate
          env:
            - name: DB_TYPE
              value: sqlite
            - name: SQLITE_DIR
              value: /app/storage
          imagePullPolicy: Always
          volumeMounts:
            - name: storage
              mountPath: /app/storage
          terminationMessagePolicy: File
          image: '10.10.20.6:5000/nmerrett/viberater-backend:latest'
      containers:
        - resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
              scheme: HTTP
            initialDelaySeconds: 10
            timeoutSeconds: 3
            periodSeconds: 5
            successThreshold: 1
            failureThreshold: 3
          terminationMessagePath: /dev/termination-log
          name: backend
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
              scheme: HTTP
            initialDelaySeconds: 30
            timeoutSeconds: 5
            periodSeconds: 10
            successThreshold: 1
            failureThreshold: 3
          env:
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: viberater-config
                  key: NODE_ENV
            - name: PORT
              value: '3000'
            - name: DB_TYPE
              value: sqlite
            - name: SQLITE_DIR
              value: /app/storage
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: viberater-secrets
                  key: JWT_SECRET
            - name: JWT_ACCESS_EXPIRY
              valueFrom:
                configMapKeyRef:
                  name: viberater-config
                  key: JWT_ACCESS_EXPIRY
            - name: JWT_REFRESH_EXPIRY
              valueFrom:
                configMapKeyRef:
                  name: viberater-config
                  key: JWT_REFRESH_EXPIRY
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: viberater-config
                  key: CORS_ORIGIN
            - name: DEFAULT_AI_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: viberater-config
                  key: DEFAULT_AI_PROVIDER
            - name: MODEL_PRIMARY
              valueFrom:
                configMapKeyRef:
                  name: viberater-config
                  key: MODEL_PRIMARY
            - name: CLAUDE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: viberater-secrets
                  key: CLAUDE_API_KEY
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: viberater-secrets
                  key: OPENAI_API_KEY
                  optional: true
            - name: OLLAMA_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: viberater-secrets
                  key: OLLAMA_BASE_URL
                  optional: true
            - name: RATE_LIMIT_WINDOW_MS
              valueFrom:
                configMapKeyRef:
                  name: viberater-config
                  key: RATE_LIMIT_WINDOW_MS
            - name: RATE_LIMIT_MAX_REQUESTS
              valueFrom:
                configMapKeyRef:
                  name: viberater-config
                  key: RATE_LIMIT_MAX_REQUESTS
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          imagePullPolicy: Always
          volumeMounts:
            - name: storage
              mountPath: /app/storage
            - name: logs
              mountPath: /app/logs
          terminationMessagePolicy: File
          image: '10.10.20.6:5000/nmerrett/viberater-backend:latest'
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      schedulerName: default-scheduler
  strategy:
    type: Recreate
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
